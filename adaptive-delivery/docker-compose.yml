services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: adaptive_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/adaptive_delivery
      NEXT_PUBLIC_APP_NAME: AdaptiveDelivery
      SESSION_TTL_SECONDS: "1800"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
